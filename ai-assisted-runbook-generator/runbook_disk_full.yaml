title: 'Operational Runbook: Root filesystem is 98% full and services may fail to
  write logs'
created: '2026-06-05T22:29:35.168245+00:00'
hostname: ip-172-31-10-10
scenario: Root filesystem is 98% full and services may fail to write logs
system:
  os_version: Ubuntu 24.04.3 LTS
  kernel: 6.14.0-1018-aws
procedure: '1. Confirm disk usage with: df -h

  2. Check inode pressure with: df -i

  3. Find large directories with: sudo du -xh / 2>/dev/null | sort -hr | head -20

  4. Check logs with: sudo journalctl --disk-usage

  5. Safely clean temporary files only after confirming ownership and impact.

  6. Verify recovery with: df -h'
verification:
- Confirm affected resource is stable
- Review logs for repeated errors
- Validate system state
- Document root cause
rollback:
- Revert risky changes
- Preserve evidence
- Escalate if recovery fails
